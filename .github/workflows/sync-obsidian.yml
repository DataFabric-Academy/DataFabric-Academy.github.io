name: Sync Obsidian to Docusaurus

on:
  # Trigger จาก Obsidian vault repository (private repo)
  # ต้องใช้ repository_dispatch จาก Obsidian vault repo
  repository_dispatch:
    types: [obsidian-updated]
  
  # หรือ trigger manual จาก GitHub UI
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source Obsidian vault repository (org/repo)'
        required: false
        default: 'DataFabric-Academy/obsidian-vault'
      source_path:
        description: 'Path to Obsidian vault in source repo'
        required: false
        default: '90_Academy/main-portal'
      target_path:
        description: 'Target path in this repo (website/docs)'
        required: false
        default: 'website/docs'

permissions:
  contents: write
  actions: read

jobs:
  sync:
    name: Sync Obsidian Content
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Target Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Rust (for obsidian-export)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install obsidian-export
        run: |
          # ตรวจสอบว่ามี obsidian-export อยู่แล้วหรือไม่
          if ! command -v obsidian-export &> /dev/null; then
            echo "Installing obsidian-export..."
            cargo install obsidian-export --version 25.3.0 || cargo install obsidian-export
          else
            echo "obsidian-export already installed"
            obsidian-export --version
          fi

      - name: Checkout Source Repository (Obsidian Vault)
        uses: actions/checkout@v4
        with:
          # ใช้ Personal Access Token สำหรับ access private repo
          token: ${{ secrets.OBSIDIAN_VAULT_TOKEN }}
          repository: ${{ github.event.inputs.source_repo || github.event.client_payload.source_repo || 'DataFabric-Academy/obsidian-vault' }}
          path: obsidian-vault
          fetch-depth: 0

      - name: Export Obsidian to Markdown
        id: export
        run: |
          SOURCE_PATH="${{ github.event.inputs.source_path || github.event.client_payload.source_path || '90_Academy/main-portal' }}"
          TARGET_PATH="${{ github.event.inputs.target_path || github.event.client_payload.target_path || 'website/docs' }}"
          
          echo "Source path: ${SOURCE_PATH}"
          echo "Target path: ${TARGET_PATH}"
          
          # ตรวจสอบว่า source path มีอยู่จริง
          if [ ! -d "obsidian-vault/${SOURCE_PATH}" ]; then
            echo "Warning: Source path 'obsidian-vault/${SOURCE_PATH}' not found"
            echo "Available directories:"
            ls -la obsidian-vault/ || true
            exit 1
          fi
          
          # สร้าง temporary directory สำหรับ export
          mkdir -p exported-content
          
          # ใช้ obsidian-export แปลง Obsidian vault เป็น standard markdown
          # --start-at: เริ่ม export จาก path นี้
          # --frontmatter=always: เพิ่ม frontmatter เสมอ
          # --no-recursive-embeds: ป้องกัน recursive embeds
          obsidian-export \
            --start-at "obsidian-vault/${SOURCE_PATH}" \
            --frontmatter=always \
            --no-recursive-embeds \
            exported-content
          
          # ตรวจสอบผลลัพธ์
          echo "Exported files:"
          find exported-content -type f | head -20
          
          # Copy ไฟล์ที่ export แล้วไปยัง target path
          mkdir -p "${TARGET_PATH}"
          
          # Copy markdown files
          find exported-content -type f -name "*.md" -exec cp --parents {} "${TARGET_PATH}/" \; || true
          
          # Copy assets (รูปภาพ, ไฟล์แนบ) - ใช้ relative path
          if [ -d "obsidian-vault/${SOURCE_PATH}/assets" ]; then
            mkdir -p "${TARGET_PATH}/assets"
            cp -r "obsidian-vault/${SOURCE_PATH}/assets"/* "${TARGET_PATH}/assets/" || true
          fi
          
          # Copy assets จาก exported-content (obsidian-export อาจ copy assets มาแล้ว)
          if [ -d "exported-content/assets" ]; then
            mkdir -p "${TARGET_PATH}/assets"
            cp -r exported-content/assets/* "${TARGET_PATH}/assets/" || true
          fi
          
          echo "Files synced to ${TARGET_PATH}"

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Check for changes
        id: changes
        run: |
          TARGET_PATH="${{ github.event.inputs.target_path || github.event.client_payload.target_path || 'website/docs' }}"
          if git diff --quiet "${TARGET_PATH}"; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
            git status
            git diff --stat "${TARGET_PATH}"
          fi

      - name: Commit Changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          TARGET_PATH="${{ github.event.inputs.target_path || github.event.client_payload.target_path || 'website/docs' }}"
          git add "${TARGET_PATH}"
          git commit -m "chore: sync content from Obsidian vault [skip ci]"
          echo "Changes committed"

      - name: Push Changes
        if: steps.changes.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
          force: false

      - name: Summary
        if: always()
        run: |
          echo "## Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Source: ${{ github.event.inputs.source_repo || github.event.client_payload.source_repo || 'DataFabric-Academy/obsidian-vault' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Target: ${{ github.event.inputs.target_path || github.event.client_payload.target_path || 'website/docs' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Changes: ${{ steps.changes.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY

