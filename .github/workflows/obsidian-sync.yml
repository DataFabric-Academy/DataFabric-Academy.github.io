name: Sync from Obsidian Vault

# Workflow นี้ใช้สำหรับ sync เนื้อหาจาก Obsidian Vault (Private Repo) 
# มาที่ Docusaurus Repository (Public Repo) ตาม Knowledge Fabric Architecture
# 
# Architecture (Flattened):
# - Source Layer: Obsidian Vault (Private Repo in Organization)
# - Transformation Layer: obsidian-export
# - Orchestration Layer: GitHub Actions
# - Presentation Layer: Docusaurus (Root Directory)

on:
  # Trigger จาก repository อื่นใน Organization (Obsidian Vault)
  repository_dispatch:
    types: [obsidian-sync]
  
  # หรือ trigger manual จาก GitHub UI
  workflow_dispatch:
    inputs:
      source_repo:
        description: 'Source Obsidian Vault Repository'
        required: true
        default: 'obsidian-vault'
        type: string
      source_branch:
        description: 'Source Branch'
        required: false
        default: 'main'
        type: string
      target_path:
        description: 'Target path in docs (leave empty for root docs)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  pull-requests: read
  actions: read

concurrency:
  group: "obsidian-sync"
  cancel-in-progress: false

jobs:
  sync-from-obsidian:
    name: Sync from Obsidian Vault
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      GITHUB_ORG: DataFabric-Academy
      SOURCE_REPO: ${{ github.event.inputs.source_repo || 'obsidian-vault' }}
      SOURCE_BRANCH: ${{ github.event.inputs.source_branch || 'main' }}
      TARGET_REPO: ${{ github.event.repository.name }} # ใช้ชื่อ Repo ปัจจุบันอัตโนมัติ
      TARGET_BRANCH: main
      TARGET_PATH: ${{ github.event.inputs.target_path || github.event.client_payload.target_path || '' }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PAT_TOKEN: ${{ secrets.OBSIDIAN_SYNC_TOKEN }} # ต้องตั้งค่า Secret นี้ใน Organization
    
    steps:
      - name: Checkout Target Repository (Docusaurus)
        uses: actions/checkout@v4
        with:
          token: ${{ env.PAT_TOKEN || env.GITHUB_TOKEN }}
          path: target-repo
          fetch-depth: 0

      - name: Checkout Source Repository (Obsidian Vault)
        id: checkout-source
        uses: actions/checkout@v4
        with:
          token: ${{ env.PAT_TOKEN || env.GITHUB_TOKEN }}
          repository: ${{ env.GITHUB_ORG }}/${{ env.SOURCE_REPO }}
          ref: ${{ env.SOURCE_BRANCH }}
          path: source-vault
          fetch-depth: 0
        continue-on-error: true

      - name: Check if Source Repository Exists
        id: check-source-repo
        run: |
          if [ -d "source-vault/.git" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Rust (for obsidian-export)
        if: steps.check-source-repo.outputs.exists == 'true'
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install obsidian-export
        if: steps.check-source-repo.outputs.exists == 'true'
        run: |
          cargo install obsidian-export --locked || echo "Using fallback binary"
        continue-on-error: true

      - name: Export Obsidian Vault to Markdown
        if: steps.check-source-repo.outputs.exists == 'true'
        run: |
          mkdir -p exported-content
          obsidian-export \
            --start-at source-vault \
            --frontmatter=always \
            --no-recursive-embeds \
            exported-content

      - name: Process and Copy Content (Flattened Path)
        if: steps.check-source-repo.outputs.exists == 'true'
        run: |
          # แก้ไขจาก target-repo/website/docs เป็น target-repo/docs
          if [ -n "${{ env.TARGET_PATH }}" ]; then
            TARGET_DOCS_PATH="target-repo/docs/${{ env.TARGET_PATH }}"
          else
            TARGET_DOCS_PATH="target-repo/docs"
          fi
          
          mkdir -p "$TARGET_DOCS_PATH"
          
          # Copy markdown files
          if [ -d "exported-content" ]; then
            find exported-content -type f -name "*.md" -exec cp --parents {} "$TARGET_DOCS_PATH"/ \;
            
            # Copy images ไปยัง static/img ของ Docusaurus
            if [ -d "exported-content/assets" ]; then
              mkdir -p "target-repo/static/img"
              find exported-content/assets -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.svg" -o -name "*.webp" \) -exec cp {} "target-repo/static/img/" \;
            fi
          fi
          
          # แปลง Wikilinks ![[image.png]] เป็น standard markdown ![]( /img/image.png)
          find "$TARGET_DOCS_PATH" -type f -name "*.md" -exec sed -i 's/!\[\[\([^]]*\.\(png\|jpg\|jpeg\|gif\|svg\|webp\)\)\]\]/![](\/img\/\1)/g' {} \;
          
          # สรุปผลการ Sync ลงหน้า Summary ของ GitHub Actions
          echo "## Content Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: ${{ env.SOURCE_REPO }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Target Docs Path**: $TARGET_DOCS_PATH" >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push Changes
        if: steps.check-source-repo.outputs.exists == 'true'
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "chore: sync content from Obsidian Vault [skip ci]"
            git push origin ${{ env.TARGET_BRANCH }}
          fi

      - name: Trigger Deployment
        if: steps.check-source-repo.outputs.exists == 'true' && success()
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ env.PAT_TOKEN || env.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ env.GITHUB_ORG }}/${{ env.TARGET_REPO }}/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"${{ env.TARGET_BRANCH }}"}'