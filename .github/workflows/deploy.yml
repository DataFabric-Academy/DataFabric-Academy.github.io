name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      # ตรวจสอบการเปลี่ยนแปลงที่ Root แทนโฟลเดอร์ website
      - 'docs/**'
      - 'src/**'
      - 'static/**'
      - 'docusaurus.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    env:
      GITHUB_ORG: DataFabric-Academy
      REPO_NAME: DataFabric-Academy.github.io
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # แก้ไข Path ของ lock file มาอยู่ที่ Root
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        # ตัด working-directory: website ออก
        run: npm ci

      - name: Build Website
        # ตัด working-directory: website ออก
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v4 # แนะนำ v3 หรือ v4 ตามมาตรฐานล่าสุด
        with:
          # ชี้ไปที่โฟลเดอร์ build ที่ Root
          path: build
          retention-days: 1

  deploy:
    name: Deploy to Production
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4