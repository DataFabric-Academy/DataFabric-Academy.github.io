name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'static/**'
      - 'docusaurus.config.ts'
      - 'package.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: package-lock.json # เปลี่ยนจาก website/package-lock.json

      - name: Install Dependencies
        run: npm ci # ตัด working-directory: website ออก

      - name: Build Website
        run: npm run build # ตัด working-directory: website ออก

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build # Docusaurus จะ build ลงที่ /build ที่ root ทันที